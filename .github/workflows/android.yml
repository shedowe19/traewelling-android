name: Android Build, Sign & Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version Name (e.g. 1.2.3)'
        required: true
        default: '1.0.0'
      version_code:
        description: 'Version Code (e.g. 1)'
        required: true
        default: '1'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleRelease -PversionName=${{ github.event.inputs.version_name }} -PversionCode=${{ github.event.inputs.version_code }}

    - name: Sign APK
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.SIGNING_KEY }}
        alias: ${{ secrets.ALIAS }}
        keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
        keyPassword: ${{ secrets.KEY_PASSWORD }}
      env:
        BUILD_TOOLS_VERSION: "34.0.0"

    - name: Prepare APK for Release
      run: |
        mv ${{ steps.sign_app.outputs.signedReleaseFile }} app/build/outputs/apk/release/traewelling-v${{ github.event.inputs.version_name }}.apk
        echo "RELEASE_APK_PATH=app/build/outputs/apk/release/traewelling-v${{ github.event.inputs.version_name }}.apk" >> $GITHUB_ENV

    - name: Generate Changelog
      id: changelog
      run: |
        # Get the last tag if it exists
        LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        if [ -z "$LAST_TAG" ]; then
          # No tags yet, get all commits
          LOG=$(git log --pretty=format:"* %s (%h)")
        else
          # Commits since last tag
          LOG=$(git log $LAST_TAG..HEAD --pretty=format:"* %s (%h)")
        fi
        
        # Escape for multiline output
        echo "body<<EOF" >> $GITHUB_OUTPUT
        echo "### Änderungen in dieser Version" >> $GITHUB_OUTPUT
        echo "$LOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create Release
      if: github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.event.inputs.version_name }}
        name: Release v${{ github.event.inputs.version_name }}
        body: ${{ steps.changelog.outputs.body }}
        files: ${{ env.RELEASE_APK_PATH }}
        generate_release_notes: false
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: ${{ env.RELEASE_APK_PATH }}
